services:
  postgres:
    image: postgres:16-alpine
    container_name: freelingo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_PATH}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freelingo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${DATA_PATH}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/artcc/freelingo-backend:latest
    container_name: freelingo-backend
    restart: unless-stopped
    command: >
      sh -c "cd /tmp && PYTHONPATH=/app alembic -c /app/alembic.ini upgrade head && cd /app && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      TTS_ENABLED: ${TTS_ENABLED:-false}
      TTS_BASE_URL: ${TTS_BASE_URL:-http://kokoro:8880}
      TTS_VOICE: ${TTS_VOICE:-af_heart}
      STT_ENABLED: ${STT_ENABLED:-false}
      STT_BASE_URL: ${STT_BASE_URL:-http://whisper:9000}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/artcc/freelingo-frontend:latest
    container_name: freelingo-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # TTS (Kokoro-FastAPI) ──────────────────────────────────────────
  # Custom fork with PyTorch 2.7+ (cu128) for Blackwell GPU support (sm_120).
  # Compatible with all previous NVIDIA architectures (sm_50+).
  # CPU-only host: replace image with ghcr.io/remsky/kokoro-fastapi-cpu:latest
  #                and remove the entire 'deploy' block.
  # See: https://github.com/ArtCC/Kokoro-FastAPI
  # Enable: set TTS_ENABLED=true in .env
  kokoro:
    image: ghcr.io/artcc/kokoro-fastapi-gpu:latest
    restart: unless-stopped
    ports:
      - "8880:8880"
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # STT (faster-whisper) ──────────────────────────────────────────
  # GPU host (NVIDIA): uses the image below as-is.
  # CPU-only host:     replace image tag with onerahmet/openai-whisper-asr-webservice:latest
  #                    set ASR_MODEL=base or small, and remove the entire 'deploy' block.
  # Enable: set STT_ENABLED=true in .env
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=medium
      - ASR_ENGINE=faster_whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]