name: APR focused checks

on:
  pull_request:
    paths:
      - '.github/workflows/apr-day2-checks.yml'
      - '.env.example'
      - 'backend/app/apr/**'
      - 'backend/app/core/config.py'
      - 'backend/app/main.py'
      - 'backend/app/services/tts_service.py'
      - 'backend/tests/test_apr.py'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - 'docs/apr/poc/**'
      - 'docs/apr/poc/APR_DAY7_FEEDBACK_RETRY.md'
      - 'docs/apr/poc/APR_DAY8_STAGING_RUNBOOK.md'
      - 'docs/apr/poc/APR_DAY8_FOUNDER_WALKTHROUGH.md'
      - 'frontend/src/app/(apr)/**'
      - 'frontend/tests/app/apr-primeira-conexao.test.tsx'
      - 'frontend/tests/app/apr-lesson-player.test.tsx'
      - 'frontend/tests/app/apr-audio-recorder.test.tsx'
      - 'frontend/tests/app/apr-transcript-confirmation.test.tsx'
      - 'frontend/tests/app/apr-model-audio.test.tsx'
      - 'frontend/tests/app/apr-feedback-retry.test.tsx'
      - 'frontend/tests/app/apr-session-closure.test.tsx'
      - 'frontend/src/components/apr/**'
      - 'frontend/package-lock.json'
      - 'frontend/package.json'

permissions:
  contents: read

jobs:
  apr-backend-tests:
    name: APR backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run APR backend tests
        env:
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          SECRET_KEY: ci-secret-key-for-apr-focused-32b
          RATE_LIMIT_ENABLED: 'false'
        run: pytest tests/test_apr.py -v --no-cov

  apr-frontend-checks:
    name: APR frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend type check
        run: npx tsc --noEmit

      - name: Run APR frontend tests
        run: npm run test:run -- apr-primeira-conexao.test.tsx apr-lesson-player.test.tsx apr-audio-recorder.test.tsx apr-transcript-confirmation.test.tsx apr-model-audio.test.tsx apr-feedback-retry.test.tsx apr-session-closure.test.tsx
