name: APR focused checks

on:
  pull_request:
    paths:
      - '.github/workflows/apr-day2-checks.yml'
      - '.env.example'
      - 'backend/app/apr/**'
      - 'backend/app/core/config.py'
      - 'backend/app/main.py'
      - 'backend/app/services/tts_service.py'
      - 'backend/tests/test_apr.py'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - 'docs/apr/poc/**'
      - 'docs/apr/poc/APR_DAY7_FEEDBACK_RETRY.md'
      - 'frontend/src/app/(apr)/**'
      - 'frontend/tests/app/apr-primeira-conexao.test.tsx'
      - 'frontend/tests/app/apr-lesson-player.test.tsx'
      - 'frontend/tests/app/apr-audio-recorder.test.tsx'
      - 'frontend/tests/app/apr-transcript-confirmation.test.tsx'
      - 'frontend/tests/app/apr-model-audio.test.tsx'
      - 'frontend/tests/app/apr-feedback-retry.test.tsx'
      - 'frontend/src/components/apr/**'
      - 'frontend/package-lock.json'
      - 'frontend/package.json'

permissions:
  contents: write

jobs:
  apply-day7-corrections:
    name: Apply transferred Day 7 corrections
    if: github.head_ref == 'codex/add-technical-feedback-and-retry-orchestration'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply and publish correction files through GitHub API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          source = Path('.github/workflows/apr-day7-publish-corrections.yml').read_text()
          start = source.index('H4sIAKcQWGoC')
          end = source.index('\nAPR_PATCH_B64', start)
          encoded = ''.join(source[start:end].split())
          patch = gzip.decompress(base64.b64decode(encoded))
          Path('/tmp/day7.patch').write_bytes(patch)
          print(f'Decoded correction patch: {len(patch)} bytes')
          PY
          git apply --check /tmp/day7.patch
          git apply /tmp/day7.patch
          for path in \
            backend/app/apr/lesson_content.py \
            backend/tests/test_apr.py \
            docs/apr/poc/APR_DAY7_FEEDBACK_RETRY.md \
            frontend/src/components/apr/AprFeedbackRetry.tsx \
            frontend/src/components/apr/AprLessonPlayer.tsx \
            frontend/tests/app/apr-feedback-retry.test.tsx
          do
            sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${GITHUB_HEAD_REF}" --jq .sha)"
            content="$(base64 -w0 "${path}")"
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message='Fix APR Day 7 feedback lifecycle hardening' \
              -f content="${content}" \
              -f branch="${GITHUB_HEAD_REF}" \
              -f sha="${sha}" >/dev/null
          done

  apr-backend-tests:
    name: APR backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run APR backend tests
        env:
          DATABASE_URL: 'sqlite+aiosqlite:///:memory:'
          SECRET_KEY: ci-secret-key-for-apr-focused-32b
          RATE_LIMIT_ENABLED: 'false'
        run: pytest tests/test_apr.py -v --no-cov

  apr-frontend-checks:
    name: APR frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend type check
        run: npx tsc --noEmit

      - name: Run APR frontend tests
        run: npm run test:run -- apr-primeira-conexao.test.tsx apr-lesson-player.test.tsx apr-audio-recorder.test.tsx apr-transcript-confirmation.test.tsx apr-model-audio.test.tsx apr-feedback-retry.test.tsx
