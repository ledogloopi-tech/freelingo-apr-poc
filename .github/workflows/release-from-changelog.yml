name: Release from changelog

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract latest changelog version and notes
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          version_line="$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$' CHANGELOG.md || true)"
          if [[ -z "$version_line" ]]; then
            echo "No version entry found in CHANGELOG.md"
            exit 1
          fi

          version="$(sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\] - .+$/\1/' <<< "$version_line")"
          tag="v${version}"

          awk -v start="$version_line" '
            $0 == start { in_section = 1 }
            in_section {
              if ($0 != start && $0 ~ /^## \[/) {
                exit
              }
              print
            }
          ' CHANGELOG.md > release_notes.md

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1 || true)"
          if [[ -z "$latest_tag" ]]; then
            should_release="true"
          elif [[ "$latest_tag" == "$tag" ]]; then
            should_release="false"
          else
            should_release="true"
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_exists="true"
          else
            tag_exists="false"
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "latest_tag=${latest_tag}"
            echo "should_release=${should_release}"
            echo "tag_exists=${tag_exists}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.changelog.outputs.should_release == 'true' && steps.changelog.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body_path: release_notes.md
          target_commitish: ${{ github.sha }}