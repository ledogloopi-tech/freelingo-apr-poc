services:
  postgres:
    image: postgres:16-alpine
    container_name: freelingo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_PATH}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freelingo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${DATA_PATH}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: freelingo-backend
    restart: unless-stopped
    command: >
      sh -c "cd /tmp && PYTHONPATH=/app alembic -c /app/alembic.ini upgrade head && cd /app && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - ${DATA_PATH}/avatars:/app/avatars
      - ${DATA_PATH}/audio:/data/audio
      - ${DATA_PATH}/tts_previews:/app/tts_previews
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      TTS_PROVIDER: ${TTS_PROVIDER:-local}
      TTS_BASE_URL: ${TTS_BASE_URL:-http://kokoro:8880}
      TTS_VOICE: ${TTS_VOICE:-af_heart}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-tts-1}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-nova}
      OPENAI_TTS_SPEED: ${OPENAI_TTS_SPEED:-1.0}
      STT_PROVIDER: ${STT_PROVIDER:-local}
      STT_BASE_URL: ${STT_BASE_URL:-http://whisper:9000}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-whisper-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      FIRST_USER_IS_ADMIN: ${FIRST_USER_IS_ADMIN:-true}
      BLOCKED_EMAIL_DOMAINS: ${BLOCKED_EMAIL_DOMAINS:-[]}
      AVAILABLE_TARGET_LANGUAGES: ${AVAILABLE_TARGET_LANGUAGES:-en-US,en-GB}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@freelingo.app}
      SMTP_TLS: ${SMTP_TLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY:-}
      STRIPE_TRIAL_DAYS: ${STRIPE_TRIAL_DAYS:-7}
      STRIPE_BASE_URL: ${STRIPE_BASE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: freelingo-frontend
    restart: unless-stopped
    command: npm run dev
    volumes:
      - ./frontend:/app
      - ./messages:/app/messages
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend