[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "S", "ANN"]
ignore = ["ANN101", "S101", "B008", "UP017"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "ANN"]
"alembic/*" = ["S", "ANN"]
"app/routers/*" = ["ANN"]
"app/models/*" = ["ANN"]
"app/services/*" = ["ANN"]
"app/core/deps.py" = ["ANN"]
"app/core/config.py" = ["ANN"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=60"
