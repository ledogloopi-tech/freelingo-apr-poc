[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "S", "ANN"]
ignore = ["S101", "B008", "UP017", "E501", "B904", "S110", "S311", "ANN401", "E402", "UP045", "ANN001", "ANN201"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "ANN"]
"alembic/*" = ["S", "ANN"]
"app/routers/*" = ["ANN"]
"app/models/*" = ["ANN"]
"app/services/*" = ["ANN"]
"app/core/deps.py" = ["ANN"]
"app/core/config.py" = ["ANN"]

[tool.black]
line-length = 100
target-version = ["py314"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=70"
