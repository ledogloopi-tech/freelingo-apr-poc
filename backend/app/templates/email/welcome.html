<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to FreeLingo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f0;
      font-family: 'Courier New', Courier, monospace;
    }

    .wrapper {
      max-width: 520px;
      margin: 40px auto;
      background: #ffffff;
      border: 1px solid #d4d4cc;
    }

    .header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid #d4d4cc;
    }

    .logo {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1a1a18;
    }

    .body {
      padding: 32px;
    }

    .greeting {
      font-size: 13px;
      color: #1a1a18;
      margin: 0 0 16px;
    }

    .text {
      font-size: 12px;
      color: #6b6b64;
      line-height: 1.7;
      margin: 0 0 24px;
    }

    .steps {
      border: 1px solid #d4d4cc;
      margin: 0 0 24px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid #d4d4cc;
    }

    .step:last-child {
      border-bottom: none;
    }

    .step-num {
      font-size: 11px;
      font-weight: bold;
      color: #1a1a18;
      letter-spacing: 0.1em;
      min-width: 18px;
      padding-top: 1px;
    }

    .step-text {
      font-size: 12px;
      color: #6b6b64;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      background: #1a1a18;
      color: #f5f5f0;
      text-decoration: none;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 12px 28px;
    }

    .footer {
      padding: 20px 32px;
      border-top: 1px solid #d4d4cc;
      font-size: 11px;
      color: #9b9b94;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="header">
      <span class="logo">● FreeLingo</span>
    </div>
    <div class="body">
      <p class="greeting">{{greeting}}</p>
      <p class="text">{{body}}</p>

      <div class="steps">
        <div class="step">
          <span class="step-num">01</span>
          <span class="step-text">{{step1}}</span>
        </div>
        <div class="step">
          <span class="step-num">02</span>
          <span class="step-text">{{step2}}</span>
        </div>
        <div class="step">
          <span class="step-num">03</span>
          <span class="step-text">{{step3}}</span>
        </div>
      </div>

      <a href="{{url}}" class="btn">{{button}}</a>
    </div>
    <div class="footer">
      {{footer}}<br />
      &copy; FreeLingo &mdash; <a href="{{base_url}}" style="color:#9b9b94;">{{base_url}}</a>
    </div>
  </div>
</body>

</html>
